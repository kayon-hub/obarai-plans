<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — 業務診斷與入門</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060610;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px;
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 0 0;
  }
  .orbit-mark {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
  }
  .orbit-name {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase;
  }
  .step-indicator { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* Progress */
  .progress-bar {
    height: 2px; background: var(--border); border-radius: 2px;
    margin: 16px 0 0; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #818cf8, #a78bfa);
    border-radius: 2px; transition: width 0.5s ease;
  }

  /* Screen */
  .screen {
    flex: 1; display: flex; flex-direction: column;
    padding: 32px 0 40px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ORBIT speech bubble */
  .orbit-speech { display: flex; gap: 12px; margin-bottom: 28px; }
  .orbit-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-top: 2px;
    box-shadow: 0 0 20px rgba(129,140,248,0.3);
  }
  .orbit-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; padding: 14px 18px; flex: 1;
  }
  .orbit-bubble p { font-size: 15px; line-height: 1.65; color: var(--text); }
  .orbit-bubble p + p { margin-top: 10px; }
  .orbit-bubble strong { color: #c4b5fd; }
  .orbit-bubble .honest-note {
    margin-top: 12px; padding: 10px 14px;
    background: rgba(129,140,248,0.08);
    border-left: 2px solid #818cf8;
    border-radius: 0 8px 8px 0;
    font-size: 13px; color: #a5b4fc; line-height: 1.5;
  }

  /* Section label */
  .section-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }

  /* Industry grid */
  .industry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (min-width: 480px) { .industry-grid { grid-template-columns: repeat(3, 1fr); } }
  .industry-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 14px; cursor: pointer;
    text-align: center; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .industry-card:hover { border-color: var(--accent); background: var(--accent-glow); }
  .industry-card .ic-icon { font-size: 28px; margin-bottom: 8px; }
  .industry-card .ic-name { font-size: 13px; font-weight: 500; line-height: 1.3; }

  /* Pain cards */
  .pain-list { display: flex; flex-direction: column; gap: 8px; }
  .pain-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
  }
  .pain-card:hover { border-color: rgba(129,140,248,0.4); }
  .pain-card.selected { border-color: var(--accent); background: var(--accent-glow); }
  .pain-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .pain-card.selected .pain-check { background: #818cf8; border-color: #818cf8; }
  .pain-check-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff; opacity: 0; transition: opacity 0.2s;
  }
  .pain-card.selected .pain-check-dot { opacity: 1; }
  .pain-text { font-size: 14px; line-height: 1.5; color: var(--text); }
  .pain-limit { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  /* Tool grid */
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tool-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 14px; cursor: pointer;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .tool-card:hover { border-color: rgba(129,140,248,0.4); }
  .tool-card.selected { border-color: var(--accent); background: var(--accent-glow); }
  .tool-icon { font-size: 22px; margin-bottom: 6px; }
  .tool-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .tool-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* Tool response */
  .tool-response {
    background: rgba(129,140,248,0.06); border-left: 2px solid #818cf8;
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 13px; color: #a5b4fc; line-height: 1.55;
    margin-top: 16px; animation: fadeUp 0.3s ease both; display: none;
  }
  .tool-response.visible { display: block; }

  /* Honest pact */
  .honest-pact {
    background: rgba(129,140,248,0.05); border: 1px solid rgba(129,140,248,0.2);
    border-radius: 14px; padding: 20px; margin-top: 16px;
    animation: fadeUp 0.5s ease both; display: none;
  }
  .honest-pact.visible { display: block; }
  .honest-pact-title {
    font-size: 13px; font-weight: 600; color: #a5b4fc;
    letter-spacing: 0.05em; margin-bottom: 10px;
  }
  .honest-pact p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .honest-pact p + p { margin-top: 8px; }
  .honest-pact strong { color: var(--text); }

  /* Diagnosis cards */
  .diag-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .diag-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    animation: fadeUp 0.4s ease both;
  }
  .diag-card:nth-child(2) { animation-delay: 0.08s; }
  .diag-card:nth-child(3) { animation-delay: 0.16s; }
  .diag-problem {
    font-size: 12px; color: var(--muted); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .diag-problem::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #f87171; flex-shrink: 0;
  }
  .diag-arrow { font-size: 18px; color: var(--muted); margin: 8px 0; display: block; }
  .diag-feature {
    font-size: 13px; font-weight: 600; color: #a5b4fc; margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .diag-feature::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: #6ee7b7; flex-shrink: 0;
  }
  .diag-solution { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Start steps */
  .start-steps { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .start-step {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .start-step:nth-child(2) { animation-delay: 0.08s; }
  .start-step:nth-child(3) { animation-delay: 0.16s; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .step-body { flex: 1; }
  .step-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }

  /* Tags */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tag {
    padding: 4px 10px;
    background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.2);
    border-radius: 99px; font-size: 12px; color: #a5b4fc;
  }

  /* CTAs */
  .cta-wrap { margin-top: auto; padding-top: 24px; }
  .btn-primary {
    display: block; width: 100%; padding: 15px;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #fff;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary {
    display: block; width: 100%; padding: 13px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 12px; font-size: 14px; color: var(--muted);
    cursor: pointer; margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:hover { border-color: rgba(129,140,248,0.4); color: var(--text); }
  .btn-enter {
    display: block; width: 100%; padding: 15px;
    background: linear-gradient(135deg, #6ee7b7, #34d399);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #052e16;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    text-decoration: none; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-enter:hover { opacity: 0.9; }
  .btn-enter:active { transform: scale(0.98); }

  /* Footer */
  .footer { text-align: center; padding: 16px 0 24px; font-size: 12px; color: #3a3a5a; }
</style>
</head>

const TOOL_OPTIONS = [
  { id: 'paper',  icon: '📝', name: '紙本 / 手寫', desc: '記在本子或白板上',
    response: '紙本的問題不是你懶，是紙本本來就不是為了管理生意而設計的。數字容易消失、難以搜尋、無法分析趨勢。這不是工具的限制——這是錯誤的工具。' },
  { id: 'excel',  icon: '📊', name: 'Excel / Google Sheets', desc: '自己建表格管理',
    response: 'Excel 很強大，但它不是為即時業務設計的。你在花時間維護工具，而不是讓工具幫你分析。當生意規模變大，這個差距會越來越明顯。' },
  { id: 'line',   icon: '💬', name: 'LINE / 通訊軟體', desc: '用群組或訊息協調',
    response: 'LINE 是溝通工具，不是管理工具。用它來記帳、追費、排班是在將就，資訊散落在對話串裡，沒辦法統計，沒辦法搜尋，容易遺漏。' },
  { id: 'mixed',  icon: '🔀', name: '都有一點，亂七八糟', desc: '多個工具混著用',
    response: '這是最誠實的答案。混用工具的結果是資訊散落各地，沒有一個地方能看到全貌。你花在「整合資訊」的時間，是最大的隱性成本。' }
];

// ── STATE ─────────────────────────────────────────────

let state = { industry: null, pains: [], tool: null, step: 'industry' };
const STEPS = ['industry', 'pains', 'tool', 'diagnosis', 'start'];

(function init() {
  const p = new URLSearchParams(location.search).get('industry');
  if (p && INDUSTRIES[p]) { state.industry = p; state.step = 'pains'; }
})();

// ── RENDER ────────────────────────────────────────────

function render() {
  const stepIdx = STEPS.indexOf(state.step) + 1;
  const pct = Math.round((stepIdx / STEPS.length) * 100);

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="orbit-mark">O</div>
      <span class="orbit-name">ORBIT</span>
      <span class="step-indicator">${stepIdx} / ${STEPS.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${buildScreen()}
    <div class="footer">ORBIT by OBARAI INTELLIGENCE</div>
  `;
  attachEvents();
}

function buildScreen() {
  const screens = { industry: screenIndustry, pains: screenPains, tool: screenTool, diagnosis: screenDiag, start: screenStart };
  return (screens[state.step] || (() => ''))();
}

// ── SCREENS ───────────────────────────────────────────

function screenIndustry() {
  const cards = Object.entries(INDUSTRIES).map(([id, ind]) =>
    `<div class="industry-card" data-id="${id}"><div class="ic-icon">${ind.icon}</div><div class="ic-name">${ind.name}</div></div>`
  ).join('');
  return `<div class="screen">
    <div class="orbit-speech"><div class="orbit-avatar">O</div><div class="orbit-bubble">
      <p>你好，我是 <strong>ORBIT</strong>。</p>
      <p>在開始使用系統之前，我想先了解你的生意遇到了什麼挑戰。</p>
      <p>這樣我才能帶你看到真正對你有用的功能，而不是走馬看花。</p>
      <div class="honest-note">先告訴我，你做的是哪種生意？</div>
    </div></div>
    <div class="section-label">選擇你的產業</div>
    <div class="industry-grid">${cards}</div>
  </div>`;
}

function screenPains() {
  const ind = INDUSTRIES[state.industry];
  const cards = ind.pains.map(p => {
    const sel = state.pains.includes(p.id) ? 'selected' : '';
    return `<div class="pain-card ${sel}" data-pain="${p.id}">
      <div class="pain-check"><div class="pain-check-dot"></div></div>
      <div class="pain-text">${p.text}</div>
    </div>`;
  }).join('');
  const limitTxt = state.pains.length === 0 ? '選 1–3 個最讓你頭痛的問題' : `已選 ${state.pains.length} 個`;
  return `<div class="screen">
    <div class="orbit-speech"><div class="orbit-avatar">O</div><div class="orbit-bubble">
      <p>${ind.icon} <strong>${ind.name}</strong>，了解。</p>
      <p>${ind.greeting}</p>
      <div class="honest-note">請誠實選，即使有點難以開口說出來。ORBIT 不評判，只幫你找解法。最多選 3 個。</div>
    </div></div>
    <div class="pain-limit" id="pain-limit">${limitTxt}</div>
    <div class="pain-list">${cards}</div>
    <div class="cta-wrap">
      <button class="btn-primary" id="btn-pains-next" ${state.pains.length > 0 ? '' : 'disabled'}>繼續 →</button>
      <button class="btn-secondary" id="btn-back-industry">← 重選產業</button>
    </div>
  </div>`;
}

function screenTool() {
  const cards = TOOL_OPTIONS.map(t =>
    `<div class="tool-card ${state.tool === t.id ? 'selected' : ''}" data-tool="${t.id}">
      <div class="tool-icon">${t.icon}</div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.desc}</div>
    </div>`
  ).join('');
  const sel = state.tool ? TOOL_OPTIONS.find(t => t.id === state.tool) : null;
  const vis = sel ? 'visible' : '';
  return `<div class="screen">
    <div class="orbit-speech"><div class="orbit-avatar">O</div><div class="orbit-bubble">
      <p>好，我記下來了。</p>
      <p>在給你分析之前，我需要了解一件事：</p>
      <p><strong>你現在是用什麼方式管理這些事情的？</strong></p>
    </div></div>
    <div class="section-label">目前使用的工具</div>
    <div class="tool-grid">${cards}</div>
    <div class="tool-response ${vis}" id="tool-response">${sel ? sel.response : ''}</div>
    <div class="honest-pact ${vis}" id="honest-pact">
      <div class="honest-pact-title">ORBIT 想在繼續前說一件事</div>
      <p>ORBIT 可以幫你看清楚你的生意，但前提是你願意輸入<strong>真實的數字</strong>。</p>
      <p>如果進入系統的資料是假的或不完整的，分析就沒有意義。</p>
      <p><strong>你對 ORBIT 誠實，ORBIT 才能對你誠實。</strong></p>
    </div>
    <div class="cta-wrap">
      <button class="btn-primary" id="btn-tool-next" ${state.tool ? '' : 'disabled'}>我了解，繼續 →</button>
      <button class="btn-secondary" id="btn-back-pains">← 回上一步</button>
    </div>
  </div>`;
}

function screenDiag() {
  const ind = INDUSTRIES[state.industry];
  const selected = ind.pains.filter(p => state.pains.includes(p.id));
  const cards = selected.map((p, i) =>
    `<div class="diag-card" style="animation-delay:${i * 0.1}s">
      <div class="diag-problem">${p.text}</div>
      <span class="diag-arrow">↓</span>
      <div class="diag-feature">${p.feature}</div>
      <div class="diag-solution">${p.solution}</div>
    </div>`
  ).join('');
  return `<div class="screen">
    <div class="orbit-speech"><div class="orbit-avatar">O</div><div class="orbit-bubble">
      <p>根據你說的，以下是 ORBIT 對你目前狀況的診斷。</p>
      <p>這 ${selected.length} 個問題，ORBIT 都可以幫你解決。</p>
      <div class="honest-note">以下不是功能介紹，是你遇到的問題對應到的解法。</div>
    </div></div>
    <div class="section-label">診斷結果</div>
    <div class="diag-list">${cards}</div>
    <div class="cta-wrap">
      <button class="btn-primary" id="btn-diag-next">看看要怎麼開始 →</button>
    </div>
  </div>`;
}

function screenStart() {
  const ind = INDUSTRIES[state.industry];
  const tags = ind.pains.filter(p => state.pains.includes(p.id)).map(p =>
    `<span class="tag">${p.feature}</span>`
  ).join('');
  const steps = ind.steps.map((s, i) =>
    `<div class="start-step" style="animation-delay:${i * 0.1}s">
      <div class="step-num">${i + 1}</div>
      <div class="step-body"><div class="step-title">${s.title}</div><div class="step-desc">${s.desc}</div></div>
    </div>`
  ).join('');
  return `<div class="screen">
    <div class="orbit-speech"><div class="orbit-avatar">O</div><div class="orbit-bubble">
      <p>很好。ORBIT 已經知道你需要什麼了。</p>
      <p>接下來只需要做 3 件事，今天就能讓系統開始為你記錄。</p>
      <p>你會需要的功能：</p>
    </div></div>
    <div class="tag-list">${tags}</div>
    <div class="section-label">今天要做的 3 件事</div>
    <div class="start-steps">${steps}</div>
    <div class="cta-wrap">
      <a class="btn-enter" href="https://app.obarai.com/dashboard" target="_blank">進入 ORBIT 開始設定 →</a>
      <button class="btn-secondary" id="btn-restart">重新診斷</button>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────

function attachEvents() {
  // Industry
  document.querySelectorAll('.industry-card').forEach(c =>
    c.addEventListener('click', () => {
      state.industry = c.dataset.id; state.pains = []; state.step = 'pains'; render();
    })
  );

  // Pains
  document.querySelectorAll('.pain-card').forEach(c =>
    c.addEventListener('click', () => {
      const id = c.dataset.pain, idx = state.pains.indexOf(id);
      if (idx >= 0) state.pains.splice(idx, 1);
      else if (state.pains.length < 3) state.pains.push(id);
      c.classList.toggle('selected', state.pains.includes(id));
      const lim = document.getElementById('pain-limit');
      if (lim) lim.textContent = state.pains.length === 0 ? '選 1–3 個最讓你頭痛的問題' : `已選 ${state.pains.length} 個`;
      const btn = document.getElementById('btn-pains-next');
      if (btn) btn.disabled = state.pains.length === 0;
    })
  );
  on('btn-pains-next', () => { if (state.pains.length > 0) { state.step = 'tool'; render(); } });
  on('btn-back-industry', () => { state.step = 'industry'; render(); });

  // Tool
  document.querySelectorAll('.tool-card').forEach(c =>
    c.addEventListener('click', () => {
      state.tool = c.dataset.tool;
      document.querySelectorAll('.tool-card').forEach(x => x.classList.toggle('selected', x.dataset.tool === state.tool));
      const sel = TOOL_OPTIONS.find(t => t.id === state.tool);
      const resp = document.getElementById('tool-response');
      const pact = document.getElementById('honest-pact');
      if (resp && sel) { resp.textContent = sel.response; resp.classList.add('visible'); }
      if (pact) pact.classList.add('visible');
      const btn = document.getElementById('btn-tool-next');
      if (btn) btn.disabled = false;
    })
  );
  on('btn-tool-next', () => { if (state.tool) { state.step = 'diagnosis'; render(); } });
  on('btn-back-pains', () => { state.step = 'pains'; render(); });

  // Diagnosis
  on('btn-diag-next', () => { state.step = 'start'; render(); });

  // Start
  on('btn-restart', () => { state = { industry: null, pains: [], tool: null, step: 'industry' }; render(); });
}

function on(id, fn) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', fn);
}

render();
</script>
