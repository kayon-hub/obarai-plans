<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — 業務診斷與入門</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060610;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 0 0;
  }
  .orbit-mark {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
  }
  .orbit-name {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase;
  }
  .step-indicator { margin-left: auto; font-size: 12px; color: var(--muted); }

  .progress-bar {
    height: 2px; background: var(--border); border-radius: 2px;
    margin: 16px 0 0; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #818cf8, #a78bfa);
    border-radius: 2px; transition: width 0.5s ease;
  }

  .screen {
    flex: 1; display: flex; flex-direction: column;
    padding: 32px 0 40px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .orbit-speech { display: flex; gap: 12px; margin-bottom: 28px; }
  .orbit-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0; margin-top: 2px;
    box-shadow: 0 0 20px rgba(129,140,248,0.3);
  }
  .orbit-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; padding: 14px 18px; flex: 1;
  }
  .orbit-bubble p { font-size: 15px; line-height: 1.7; color: var(--text); }
  .orbit-bubble p + p { margin-top: 10px; }
  .orbit-bubble strong { color: #c4b5fd; }
  .orbit-bubble .note {
    margin-top: 12px; padding: 10px 14px;
    background: rgba(129,140,248,0.07);
    border-left: 2px solid rgba(129,140,248,0.5);
    border-radius: 0 8px 8px 0;
    font-size: 13px; color: #a5b4fc; line-height: 1.55;
  }

  .section-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }

  /* Industry text input */
  .industry-input-wrap { position: relative; margin-bottom: 12px; }
  .industry-input {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .industry-input::placeholder { color: var(--muted); }
  .industry-input:focus { border-color: rgba(129,140,248,0.5); }
  .industry-hint {
    font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5;
  }
  .industry-detected {
    margin-top: 14px; padding: 12px 16px;
    background: rgba(110,231,183,0.07); border: 1px solid rgba(110,231,183,0.2);
    border-radius: 10px; font-size: 13px; color: #6ee7b7;
    display: none; animation: fadeUp 0.3s ease both;
  }
  .industry-detected.visible { display: block; }

  /* Pain cards */
  .pain-list { display: flex; flex-direction: column; gap: 8px; }
  .pain-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  .pain-card:hover { border-color: rgba(129,140,248,0.35); }
  .pain-card.selected { border-color: var(--accent); background: var(--accent-glow); }
  .pain-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .pain-card.selected .pain-check { background: #818cf8; border-color: #818cf8; }
  .pain-check-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff; opacity: 0; transition: opacity 0.2s;
  }
  .pain-card.selected .pain-check-dot { opacity: 1; }
  .pain-text { font-size: 14px; line-height: 1.5; color: var(--text); }
  .pain-limit { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  /* Tool grid */
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tool-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 14px; cursor: pointer;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .tool-card:hover { border-color: rgba(129,140,248,0.35); }
  .tool-card.selected { border-color: var(--accent); background: var(--accent-glow); }
  .tool-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .tool-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .tool-response {
    background: rgba(129,140,248,0.05); border-left: 2px solid rgba(129,140,248,0.4);
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 13px; color: #a5b4fc; line-height: 1.6;
    margin-top: 16px; display: none; animation: fadeUp 0.3s ease both;
  }
  .tool-response.visible { display: block; }

  .honest-pact {
    background: rgba(129,140,248,0.04); border: 1px solid rgba(129,140,248,0.15);
    border-radius: 14px; padding: 18px; margin-top: 16px;
    display: none; animation: fadeUp 0.5s ease both;
  }
  .honest-pact.visible { display: block; }
  .honest-pact-title {
    font-size: 12px; font-weight: 600; color: rgba(165,180,252,0.7);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px;
  }
  .honest-pact p { font-size: 13px; color: var(--muted); line-height: 1.65; }
  .honest-pact p + p { margin-top: 8px; }
  .honest-pact strong { color: #c4b5fd; }

  /* Diagnosis */
  .diag-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .diag-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    animation: fadeUp 0.4s ease both;
  }
  .diag-card:nth-child(2) { animation-delay: 0.08s; }
  .diag-card:nth-child(3) { animation-delay: 0.16s; }
  .diag-problem {
    font-size: 12px; color: rgba(248,113,113,0.8); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .diag-problem::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(248,113,113,0.6); flex-shrink: 0;
  }
  .diag-arrow { font-size: 16px; color: var(--muted); margin: 8px 0; display: block; }
  .diag-feature {
    font-size: 13px; font-weight: 600; color: #a5b4fc; margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .diag-feature::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(110,231,183,0.7); flex-shrink: 0;
  }
  .diag-solution { font-size: 13px; color: var(--muted); line-height: 1.55; }

  /* Start */
  .start-steps { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .start-step {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .start-step:nth-child(2) { animation-delay: 0.08s; }
  .start-step:nth-child(3) { animation-delay: 0.16s; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .step-body { flex: 1; }
  .step-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.45; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tag {
    padding: 4px 10px;
    background: rgba(129,140,248,0.09); border: 1px solid rgba(129,140,248,0.18);
    border-radius: 99px; font-size: 12px; color: #a5b4fc;
  }

  .cta-wrap { margin-top: auto; padding-top: 24px; }
  .btn-primary {
    display: block; width: 100%; padding: 15px;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #fff;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary {
    display: block; width: 100%; padding: 13px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 12px; font-size: 14px; color: var(--muted);
    cursor: pointer; margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:hover { border-color: rgba(129,140,248,0.35); color: var(--text); }
  .btn-enter {
    display: block; width: 100%; padding: 15px;
    background: linear-gradient(135deg, #6ee7b7, #34d399);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; color: #052e16;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    text-decoration: none; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-enter:hover { opacity: 0.88; }
  .btn-enter:active { transform: scale(0.98); }

  .footer { text-align: center; padding: 16px 0 24px; font-size: 12px; color: #2e2e4a; }
</style>
</head>

function detectIndustry(input) {
  const text = input.toLowerCase();
  for (const { id, words } of INDUSTRY_KEYWORDS) {
    if (words.some(w => text.includes(w))) return id;
  }
  return null;
}

// ── STATE ─────────────────────────────────────────────

let state = { industry: null, industryInput: '', pains: [], tool: null, step: 'industry' };
const STEPS = ['industry', 'pains', 'tool', 'diagnosis', 'start'];

(function init() {
  const p = new URLSearchParams(location.search).get('industry');
  if (p && INDUSTRIES[p]) { state.industry = p; state.step = 'pains'; }
})();

// ── RENDER ────────────────────────────────────────────

function render() {
  const stepIdx = STEPS.indexOf(state.step) + 1;
  const pct = Math.round((stepIdx / STEPS.length) * 100);
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="orbit-mark">O</div>
      <span class="orbit-name">ORBIT</span>
      <span class="step-indicator">${stepIdx} / ${STEPS.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${buildScreen()}
    <div class="footer">ORBIT by OBARAI INTELLIGENCE</div>
  `;
  attachEvents();
}

function buildScreen() {
  const screens = { industry: screenIndustry, pains: screenPains, tool: screenTool, diagnosis: screenDiag, start: screenStart };
  return (screens[state.step] || (() => ''))();
}

    ${shareBlock}
    <div class="cta-wrap">
      <a class="btn-enter" href="https://app.obarai.com/dashboard" target="_blank">進入 ORBIT 開始設定</a>
      <button class="btn-secondary" id="btn-restart">重新填寫</button>
    </div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────

function attachEvents() {
  // Industry input
  const input = document.getElementById('industry-input');
  const detected = document.getElementById('industry-detected');
  const btnNext = document.getElementById('btn-industry-next');

  function tryDetect(val) {
    state.industryInput = val;
    if (!val.trim()) {
      state.industry = null;
      if (detected) { detected.textContent = ''; detected.classList.remove('visible'); }
      if (btnNext) btnNext.disabled = true;
      return;
    }
    const id = detectIndustry(val);
    if (id) {
      state.industry = id;
      const name = INDUSTRIES[id].name;
      if (detected) { detected.textContent = '偵測到：' + name; detected.classList.add('visible'); }
      if (btnNext) btnNext.disabled = false;
    } else {
      state.industry = 'universal';
      if (detected) { detected.textContent = '您的產業範圍較廣，ORBIT 將協助您找出最適合的起步方向'; detected.classList.add('visible'); }
      if (btnNext) btnNext.disabled = false;
    }
  }

  let detectTimer = null;
  function scheduleDetect(val) {
    state.industryInput = val;
    if (!val.trim()) {
      if (detectTimer) { clearTimeout(detectTimer); detectTimer = null; }
      state.industry = null;
      if (detected) { detected.textContent = ''; detected.classList.remove('visible'); }
      if (btnNext) btnNext.disabled = true;
      return;
    }
    if (detectTimer) clearTimeout(detectTimer);
    if (detected) { detected.textContent = ''; detected.classList.remove('visible'); }
    if (btnNext) btnNext.disabled = true;
    detectTimer = setTimeout(() => tryDetect(val), 600);
  }

  if (input) {
    if (state.industryInput) tryDetect(state.industryInput);
    input.addEventListener('input', e => scheduleDetect(e.target.value));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && state.industry) { state.step = 'pains'; render(); }
    });
  }
  on('btn-industry-next', () => { if (state.industry) { state.step = 'pains'; render(); } });

  // Pains
  document.querySelectorAll('.pain-card').forEach(c =>
    c.addEventListener('click', () => {
      const id = c.dataset.pain, idx = state.pains.indexOf(id);
      if (idx >= 0) state.pains.splice(idx, 1);
      else if (state.pains.length < 3) state.pains.push(id);
      c.classList.toggle('selected', state.pains.includes(id));
      const lim = document.getElementById('pain-limit');
      if (lim) lim.textContent = state.pains.length === 0 ? '選 1 到 3 個你最有感的' : `已選 ${state.pains.length} 個`;
      const btn = document.getElementById('btn-pains-next');
      if (btn) btn.disabled = state.pains.length === 0;
    })
  );
  on('btn-pains-next', () => { if (state.pains.length > 0) { state.step = 'tool'; render(); } });
  on('btn-back-industry', () => { state.step = 'industry'; render(); });

  // Tool
  document.querySelectorAll('.tool-card').forEach(c =>
    c.addEventListener('click', () => {
      state.tool = c.dataset.tool;
      document.querySelectorAll('.tool-card').forEach(x => x.classList.toggle('selected', x.dataset.tool === state.tool));
      const sel = TOOL_OPTIONS.find(t => t.id === state.tool);
      const resp = document.getElementById('tool-response');
      const pact = document.getElementById('honest-pact');
      if (resp && sel) { resp.textContent = sel.response; resp.classList.add('visible'); }
      if (pact) pact.classList.add('visible');
      const btn = document.getElementById('btn-tool-next');
      if (btn) btn.disabled = false;
    })
  );
  on('btn-tool-next', () => { if (state.tool) { state.step = 'diagnosis'; render(); } });
  on('btn-back-pains', () => { state.step = 'pains'; render(); });

  // Diagnosis
  on('btn-diag-next', () => { state.step = 'start'; render(); });

  // Start
  on('btn-restart', () => { state = { industry: null, industryInput: '', pains: [], tool: null, step: 'industry' }; render(); });
}

function on(id, fn) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', fn);
}

render();
</script>
</body>
